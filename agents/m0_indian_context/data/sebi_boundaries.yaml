# =============================================================================
# sebi_boundaries.yaml
# =============================================================================
# SEBI rules, category boundaries, and product-specific norms for
# M0.IndianContext rule-based reasoning.
#
# DISCLOSURE: Indicative reference data for demonstration purposes; not
# validated by credentialed domain experts as a whole. Each entry's
# `citation_source_type` discloses its trust posture. Production deployment
# requires the firm's compliance team to validate, supplement, or replace
# entries before reliance.
#
# Citation taxonomy (same as tax_matrix.yaml):
#   statute_section      : SEBI Act, Companies Act, etc.
#   regulatory_circular  : Dated SEBI/RBI/CBDT circular reference
#   web_verified         : Confirmed against authoritative source on a date
#   foundation_internal  : Drawn from project foundation docs (not used for rate-specific)
#   practitioner_practice: Established practice with named source
#
# Confidence enum:
#   authoritative : statute, regulatory_circular, web_verified from gov source
#   indicative    : web_verified from practitioner, foundation_internal, practitioner_practice
#
# Structure: flat list of entries with `rule_type` enum.
# Entry IDs prefixed `sebi_`.
# =============================================================================

