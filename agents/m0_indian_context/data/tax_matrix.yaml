# DISCLOSURE: This is indicative reference data for demonstration purposes,
# not validated by credentialed domain experts as a whole. Each entry's
# `citation_source_type` discloses its trust posture. Production deployment
# requires the firm's compliance team to validate, supplement, or replace
# entries before reliance.
#
# Citation taxonomy:
#   statute_section      : Income Tax Act, Companies Act, etc. with section
#   regulatory_circular  : Dated SEBI/RBI/CBDT/etc. circular reference
#   web_verified         : Confirmed against authoritative public source on a date
#   foundation_internal  : Drawn from project foundation docs (AI-curated, unvalidated)
#   practitioner_practice: Established Indian wealth-management practice, named source
#
# Confidence enum:
#   authoritative : statute, regulatory_circular, web_verified from gov source
#   indicative    : web_verified from practitioner, foundation_internal, practitioner_practice
#
# Sections: capital_gains, surcharge, aif_passthrough, mf_classification,
#           nri_treaty, indexation, pms_lookthrough (entry_id prefix pmlt_), tds
# =============================================================================

