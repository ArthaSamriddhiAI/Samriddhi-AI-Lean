# END OF structure_matrix.yaml
# Entry count: 11 entries
#   Individual: 1 (str_001 resident)
#   NRI: 1 (str_002 non-resident)
#   HUF: 1 (str_003)
#   Trust: 3 (str_004 private discretionary, str_005 charitable, str_006 family AI-eligible)
#   Corporate: 2 (str_007 pvt ltd, str_008 LLP)
#   Edge cases: 2 (str_009 US Person, str_010 senior citizen)
#   Partnership: 1 (str_011)
# Coverage target was 10-15; 11 lands in range.
# =============================================================================
